<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ripple Light Matrix</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="control-panel">
        <h2>Light Matrix Controls</h2>
        
        <div class="control-group">
            <button id="start-stop-btn">Start</button>
        </div>
        
        <div class="control-group">
            <label for="interval-input">Speed (ms): <span id="interval-value">1000</span></label>
            <input type="range" id="interval-input" min="100" max="2000" value="1000">
            <input type="number" id="interval-number" min="100" max="2000" value="1000">
        </div>
        
        <div class="control-group">
            <label for="intensity-input">Intensity: <span id="intensity-value">1.0</span></label>
            <input type="range" id="intensity-input" min="30" max="100" value="100">
            <input type="number" id="intensity-number" min="0.3" max="1.0" step="0.01" value="1.0">
        </div>
        
        <div class="control-group">
            <label for="color-select">Color:</label>
            <select id="color-select">
                <option value="#dc2626">Crimson Red</option>
                <option value="#16a34a">Emerald Green</option>
                <option value="#ca8a04">Classic Gold</option>
                <option value="#2563eb">Royal Blue</option>
            </select>
        </div>
        
        <div class="control-group">
            <label for="size-select">Size:</label>
            <select id="size-select">
                <option value="20px">Small</option>
                <option value="30px" selected>Medium</option>
                <option value="40px">Large</option>
            </select>
        </div>
        
        <div class="control-group">
            <label for="row-count">Rows (1-7):</label>
            <input type="number" id="row-count" min="1" max="7" value="3">
        </div>
    </div>
    
    <div id="lights-display-matrix"></div>
    
    <script src="app.js"></script>
</body>
</html>
